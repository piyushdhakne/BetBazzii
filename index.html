<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Friend's Gambling Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Your CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ================= AUTH SCREEN ================= -->
<div id="authScreen" class="active">
    <h1>🎰 Friend's Gambling Hub</h1>

    <div>
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
    </div>

    <!-- Login -->
    <form id="loginForm" class="active">
        <input id="loginUsername" placeholder="Username" required>
        <input id="loginPassword" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <!-- Register -->
    <form id="registerForm">
        <input id="regUsername" placeholder="Username" required>
        <input id="regPassword" type="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p id="authError" style="color:red;"></p>
</div>

<!-- ================= GAME SCREEN ================= -->
<div id="gameScreen">

    <h2>Welcome <span id="playerName"></span></h2>
    <p>Points: <span id="playerPoints"></span></p>

    <canvas id="spinWheel" width="300" height="300"></canvas>

    <div>
        <p>Select Number:</p>
        <div>
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
        </div>
    </div>

    <input id="betAmount" type="number" placeholder="Enter bet">
    <button id="spinBtn">Spin</button>

    <h3 id="spinResult"></h3>

    <button id="logoutBtn">Logout</button>

    <!-- ADMIN PANEL -->
    <button id="toggleAdmin" class="hidden">Admin Panel</button>

    <div id="adminPanel">
        <h3>Admin Controls</h3>

        <select id="adminSelectPlayer"></select>
        <input id="adminPointsInput" type="number" placeholder="Points">

        <button id="adminAddPoints">Add</button>
        <button id="adminRemovePoints">Remove</button>
        <button id="adminSetPoints">Set</button>

        <hr>

        <p>Rig Spin Result:</p>
        <input id="rigNumber" type="number" min="0" max="9" value="0">
        <p id="rigStatus">Random Mode</p>

        <hr>

        <button id="clearHistory">Clear History</button>

        <div id="playerList"></div>
        <div id="gameHistory"></div>
    </div>
</div>
