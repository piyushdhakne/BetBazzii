<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetBazzii Spinner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="authScreen" class="screen active">
    <div class="auth-container card">
        <h1>🎯 BetBazzii Spinner</h1>
        <p class="subtitle">Multiplayer spin betting with admin controls.</p>

        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Register</button>
        </div>

        <form id="loginForm" class="auth-form active">
            <input id="loginId" autocomplete="username" placeholder="Player ID" required>
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <form id="registerForm" class="auth-form">
            <input id="regId" autocomplete="username" placeholder="Choose Player ID" required>
            <input id="regPassword" type="password" autocomplete="new-password" placeholder="Choose Password" required>
            <button type="submit">Create Player</button>
        </form>

        <p id="authMessage" class="message"></p>
    </div>
</div>

<div id="gameScreen" class="screen">
    <header class="topbar card">
        <div>
            <h2>Welcome, <span id="playerName"></span></h2>
            <p>ID login only — no OTP.</p>
        </div>
        <div class="stats">
            <p><strong>Points:</strong> <span id="playerPoints">0</span></p>
            <p><strong>Minimum bet:</strong> <span id="minBetLabel">0</span></p>
            <p><strong>Minimum points to play:</strong> <span id="minPointsLabel">0</span></p>
            <p><strong>Players online:</strong> <span id="onlineCount">0</span></p>
        </div>
    </header>

    <section class="card game-area">
        <div class="wheel-wrap">
            <canvas id="spinWheel" width="360" height="360" aria-label="Spinner Wheel"></canvas>
            <div class="pointer"></div>
        </div>

        <div class="bet-panel">
            <h3>Pick your number</h3>
            <div class="numbers" id="numbers"></div>
            <input id="betAmount" type="number" min="1" placeholder="Enter bet points">
            <button id="spinBtn">Spin</button>
            <p id="spinResult" class="result"></p>
        </div>
    </section>

    <div class="actions">
        <button id="toggleAdmin" class="hidden">Open Admin Panel</button>
        <button id="logoutBtn" class="danger">Logout</button>
    </div>

    <section id="adminPanel" class="card hidden">
        <h3>Admin Controls</h3>

        <div class="admin-grid">
            <label>
                Select player
                <select id="adminSelectPlayer"></select>
            </label>
            <label>
                Set total points
                <input id="adminPointsInput" type="number" min="0" placeholder="Total points">
            </label>
            <button id="adminSetPoints">Update Player Points</button>
        </div>

        <hr>

        <div class="admin-grid">
            <label>
                Minimum bet points
                <input id="adminMinBet" type="number" min="1" placeholder="Minimum bet">
            </label>
            <label>
                Minimum points needed to play
                <input id="adminMinPoints" type="number" min="0" placeholder="Minimum points">
            </label>
            <button id="adminSaveRules">Save Betting Rules</button>
        </div>

        <hr>

        <div class="admin-grid">
            <label>
                Force next result (1-10)
                <input id="rigNumber" type="number" min="1" max="10" placeholder="Leave blank for random">
            </label>
            <button id="adminSaveRig">Save Result Control</button>
            <p id="rigStatus">Current mode: Random</p>
        </div>
    </section>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
